name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:sim
      - run: pnpm examples:basic
      - run: pnpm examples:scheduler
      - run: pnpm examples:guard
      - run: pnpm examples:convergence
      - run: pnpm build
      - run: pnpm packcheck
